name: Build HA DeskLink v2

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish src/HaDeskLink -c Release -r win-x64 --self-contained -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HA-DeskLink-Publish
          path: publish/

  installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download publish
        uses: actions/download-artifact@v4
        with:
          name: HA-DeskLink-Publish
          path: publish/

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Read version
        id: version
        shell: bash
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build Installer
        run: |
          iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: HA-DeskLink-Installer
          path: output/HA_DeskLink_Setup_*.exe

  release:
    needs: installer
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: HA-DeskLink-Installer
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HA_DeskLink_Setup_*.exe
          body: |
            HA DeskLink v${{ steps.version.outputs.VERSION }}

            ## Installation
            `HA_DeskLink_Setup_${{ steps.version.outputs.VERSION }}.exe` herunterladen und ausführen.
            Installiert nach `C:\Program Files\HA DeskLink\`.

            **Wichtig:** Als Administrator starten für CPU/GPU-Temperatur!

            ## Features
            - CPU & GPU Temperatur (LibreHardwareMonitor)
            - Alle Laufwerke (C:, D:, etc.)
            - Command-Buttons (Shutdown, Restart, Lock, Hibernate)
            - WebView2 Dashboard (mit Auto-Install)
            - Auto-Update von GitHub
            - Nativer Windows Tray
          generate_release_notes: false

      - name: Discord Release Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          curl -s -X POST -H "Content-Type: application/json" "$DISCORD_WEBHOOK" \
            -d "{\"username\":\"HA DeskLink Release\",\"embeds\":[{\"title\":\"🪟 HA DeskLink Windows v${VERSION}\",\"color\":5763719,\"fields\":[{\"name\":\"📦 Download\",\"value\":\"[GitHub Release](https://github.com/TechFlipsi/ha-desklink-dotnet/releases/latest)\"}]}]}"