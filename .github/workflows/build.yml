name: Build HA DeskLink v2

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/HaDeskLink

      - name: Publish
        run: |
          dotnet publish src/HaDeskLink -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: List output
        shell: bash
        run: ls -la publish/ | head -30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HA-DeskLink-EXE
          path: publish/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: HA-DeskLink-EXE
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HA_DeskLink.exe
          body: |
            HA DeskLink v${{ steps.version.outputs.VERSION }}

            ## Installation
            ZIP herunterladen, entpacken, `HA_DeskLink.exe` starten.
            Setup-Wizard f\u00fchrt durch die Verbindung mit Home Assistant.

            **Wichtig:** Als Administrator starten f\u00fcr CPU/GPU-Temperatur!

            ## Features
            - CPU & GPU Temperatur (LibreHardwareMonitor)
            - Alle Laufwerke (C:, D:, etc.)
            - Command-Buttons (Shutdown, Restart, Lock, Hibernate)
            - WebView2 Dashboard (mit Auto-Install)
            - Auto-Update von GitHub
            - Nativer Windows Tray
          generate_release_notes: false