name: Build HA DeskLink v2

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/HaDeskLink

      - name: Publish
        run: |
          dotnet publish src/HaDeskLink -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HA-DeskLink-EXE
          path: publish/HA_DeskLink.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: HA-DeskLink-EXE
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HA_DeskLink.exe
          body: |
            HA DeskLink v2.0 – C#/.NET 8

            ## Installation
            `HA_DeskLink.exe` herunterladen und starten.
            Setup-Wizard f\u00fchrt durch die Verbindung mit Home Assistant.

            ## Features
            - CPU & GPU Temperatur (LibreHardwareMonitor)
            - Alle Laufwerke (C:, D:, etc.)
            - Eingebettetes HA Dashboard (WebView2)
            - HA Commands (Shutdown, Restart, Lock, Hibernate)
            - Nativer Windows Tray
          generate_release_notes: false